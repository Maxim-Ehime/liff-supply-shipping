<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フォームを開いています</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f7f9;
      color: #333;
      font-family: -apple-system, "Helvetica Neue", sans-serif;
      font-weight: bold;
    }
  </style>
  <script>
    (function () {
      function normalizeForm(value) {
        return String(value || "").trim().toLowerCase();
      }

      function formFromPathOrQuery(value) {
        const text = String(value || "");
        const lower = text.toLowerCase();
        if (lower.indexOf("order_form.html") !== -1) return "order";
        if (lower.indexOf("product_request.html") !== -1) return "product";
        if (lower.indexOf("history.html") !== -1) return "history";

        const queryIndex = text.indexOf("?");
        const query = queryIndex >= 0 ? text.slice(queryIndex + 1) : text.replace(/^\?/, "");
        const params = new URLSearchParams(query);
        return normalizeForm(params.get("form"));
      }

      function targetByForm(form) {
        if (form === "order") return "./order_form.html";
        if (form === "product") return "./product_request.html";
        if (form === "history") return "./history.html";
        return "./index.html";
      }

      const params = new URLSearchParams(window.location.search);
      const directForm = normalizeForm(params.get("form"));
      const liffStateForm = formFromPathOrQuery(params.get("liff.state"));
      const pathForm = formFromPathOrQuery(window.location.pathname);
      const form = directForm || liffStateForm || pathForm || "shipping";

      window.location.replace(targetByForm(form));
    })();
  </script>
</head>

<body>フォームを開いています...</body>

</html>
