<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #f7f9fc;
      --panel: #ffffff;
      --line: #d8e0ec;
      --text: #1f2d3d;
      --muted: #6c7a89;
      --accent: #2f6fed;
      --accent-soft: #e8f0ff;
    }

    body {
      margin: 0;
      padding: 12px;
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
    }

    .header {
      display: grid;
      grid-template-columns: 40px 1fr 40px;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .month-label {
      text-align: center;
      font-size: 16px;
      font-weight: 700;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    button.ghost {
      color: var(--muted);
    }

    .week {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      line-height: 1;
    }

    .day.muted {
      color: #a8b2bf;
    }

    .day.selected {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 700;
    }

    .day.today {
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    .selected-line {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      min-height: 18px;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <button type="button" onclick="moveMonth(-1)">&lt;</button>
      <div id="monthLabel" class="month-label"></div>
      <button type="button" onclick="moveMonth(1)">&gt;</button>
    </div>
    <div class="week">
      <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
    </div>
    <div id="grid" class="grid"></div>
    <div id="selectedLine" class="selected-line"></div>
    <div class="footer">
      <button type="button" class="ghost" onclick="clearDates()">クリア</button>
      <div>
        <button type="button" class="ghost" onclick="google.script.host.close()">閉じる</button>
        <button type="button" class="primary" onclick="applyDates()">適用</button>
      </div>
    </div>
  </div>

  <script>
    const initialDates = JSON.parse('<?!= initialDatesJson ?>' || "[]");
    const selected = new Set(initialDates);
    const today = toDateKey(new Date());
    let current = getInitialMonth();

    function getInitialMonth() {
      const base = initialDates.length > 0 ? new Date(initialDates[0]) : new Date();
      return new Date(base.getFullYear(), base.getMonth(), 1);
    }

    function toDateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function moveMonth(delta) {
      current = new Date(current.getFullYear(), current.getMonth() + delta, 1);
      render();
    }

    function toggleDate(key) {
      if (selected.has(key)) selected.delete(key);
      else selected.add(key);
      render();
    }

    function clearDates() {
      selected.clear();
      render();
    }

    function applyDates() {
      const dates = Array.from(selected).sort();
      google.script.run
        .withSuccessHandler(() => google.script.host.close())
        .withFailureHandler((error) => alert(error && error.message ? error.message : String(error)))
        .saveDashboardSelectedDates(dates);
    }

    function render() {
      const label = document.getElementById("monthLabel");
      label.textContent = `${current.getFullYear()}年${current.getMonth() + 1}月`;

      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      const firstDay = new Date(current.getFullYear(), current.getMonth(), 1);
      const start = new Date(firstDay);
      start.setDate(start.getDate() - start.getDay());

      for (let i = 0; i < 42; i += 1) {
        const date = new Date(start);
        date.setDate(start.getDate() + i);
        const key = toDateKey(date);
        const inMonth = date.getMonth() === current.getMonth();
        const isSelected = selected.has(key);

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "day" + (inMonth ? "" : " muted") + (isSelected ? " selected" : "") + (key === today ? " today" : "");
        btn.textContent = String(date.getDate());
        btn.addEventListener("click", () => toggleDate(key));
        grid.appendChild(btn);
      }

      const selectedLine = document.getElementById("selectedLine");
      const list = Array.from(selected).sort();
      if (list.length === 0) {
        selectedLine.textContent = "未選択";
      } else if (list.length === 1) {
        selectedLine.textContent = list[0];
      } else {
        selectedLine.textContent = `${list[0]} ~ ${list[list.length - 1]} (${list.length}日)`;
      }
    }

    render();
  </script>
</body>
</html>
